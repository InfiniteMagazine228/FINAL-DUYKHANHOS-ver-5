name: Build FINAL-DUYKHANHOS v5

on:
  workflow_dispatch: # Bấm nút Run thủ công trên giao diện GitHub

jobs:
  build-iso:
    runs-on: ubuntu-latest
    # Chạy trực tiếp trong môi trường Kali Linux chính gốc
    container:
      image: kalilinux/kali-rolling:latest
      options: --privileged

    steps:
      - name: 1. Kiểm tra mã nguồn kho lưu trữ DuyKhánh OS
        uses: actions/checkout@v4

      - name: 2. Cài đặt các công cụ đóng gói chuẩn Kali Linux
        run: |
          apt-get update
          apt-get install -y live-build kali-archive-keyring imagemagick wget git

      - name: 3. Tải phôi cấu hình trực tiếp từ hãng Kali
        run: |
          # Nhân bản kho cấu hình chính thức
          git clone --depth=1 https://github.com live-build

      - name: 4. Tự động vẽ hình nền và logo thương hiệu DuyKhánh OS
        run: |
          # Tạo đường dẫn chứa ảnh nền theo đúng chuẩn cấu trúc mới của Kali
          TARGET_DIR="live-build/kali-config/common/includes.chroot/usr/share/images/desktop-base"
          mkdir -p $TARGET_DIR
          
          # Vẽ ảnh nền máy tính chữ xanh neon phát sáng trên nền đen
          convert -size 1920x1080 xc:black -font DejaVu-Sans-Bold -pointsize 72 \
          -fill "#00FF00" -gravity center -draw "text 0,0 'FINAL-DUYKHANHOS v5'" \
          -fill white -pointsize 24 -draw "text 0,80 'Custom Security OS by DuyKhanh'" \
          $TARGET_DIR/login-background.png
          
          # Copy làm hình nền mặc định cho giao diện đồ họa
          cp $TARGET_DIR/login-background.png $TARGET_DIR/kali-wallpaper-16x9.png

          # Vẽ logo vuông cho Start Menu
          convert -size 512x512 xc:black -font DejaVu-Sans-Bold -pointsize 48 \
          -fill "#00FF00" -gravity center -draw "text 0,0 'DK OS'" \
          $TARGET_DIR/kali-logo-light.png
          cp $TARGET_DIR/kali-logo-light.png $TARGET_DIR/kali-logo-dark.png

      - name: 5. Tích hợp giao diện XFCE, Terminal, Wifi và App của DuyKhánh
        run: |
          # Nhúng file cài ứng dụng của bạn vào danh sách build
          if [ -f config/packages.chroot ]; then
            cp config/packages.chroot live-build/kali-config/variant-live-minimal/package-lists/
          else
            # Tự động tạo danh sách ứng dụng lõi mượt nhẹ nếu file trống
            echo "kali-desktop-xfce xfce4-terminal kali-themes lightdm network-manager-gnome firmware-linux firmware-linux-nonfree firmware-iwlwifi firmware-realtek firmware-brcm80211 wpasupplicant chromium" > live-build/kali-config/variant-live-minimal/package-lists/duykhanh.list.chroot
          fi
          
          # Đưa file About vào màn hình Desktop
          if [ -d config/includes.chroot ]; then
            cp -r config/includes.chroot/* live-build/kali-config/common/includes.chroot/
          fi

      - name: 6. Khởi chạy tiến trình biên dịch file ISO
        run: |
          cd live-build
          # Chạy kịch bản build chính thức của Kali Linux bằng quyền tối cao
          bash build.sh --variant live-minimal --arch amd64 --verbose

      - name: 7. Tự động đẩy file ISO lên mục GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Bản FULL FIX DOCKER hoàn chỉnh! Đã sửa đổi tham số và đường dẫn chạy trong môi trường Kali gốc."
          files: live-build/images/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
