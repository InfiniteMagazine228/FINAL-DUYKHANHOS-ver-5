name: Build DuyKhanhOS

on:
  workflow_dispatch:

jobs:
  build-arm64-os:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential genisoimage debootstrap qemu-user-static rsync parted

      - name: Create RootFS with GUI + Apps
        run: |
          sudo debootstrap --arch=arm64 --foreign --variant=minbase stable rootfs http://deb.debian.org/debian
          sudo cp /usr/bin/qemu-aarch64-static rootfs/usr/bin/
          sudo chroot rootfs /debootstrap/debootstrap --second-stage
          sudo chroot rootfs apt-get update
          sudo chroot rootfs apt-get install -y kali-desktop-manager xfce4 lightdm
          sudo chroot rootfs apt-get install -y chromium ibus-unikey zsh kali-tools-top10
          sudo chroot rootfs apt-get install -y arc-theme papirus-icon-theme
          echo "DuyKhanhOS Cyberpunk XFCE" > rootfs/etc/motd
          cp rootfs/install.sh iso/install.sh
          chmod +x iso/install.sh

      - name: Package ISO with GRUB menu
        run: |
          mkdir -p iso/boot/grub
          cp rootfs/boot/vmlinuz* iso/boot/vmlinuz
          cp rootfs/boot/initrd* iso/boot/initrd.img
          cat > iso/boot/grub/grub.cfg <<'EOF'
          set default=0
          set timeout=5

          menuentry "Try DuyKhanhOS (Live)" {
              linux /boot/vmlinuz root=/dev/ram0 init=/bin/bash
              initrd /boot/initrd.img
          }

          menuentry "Install DuyKhanhOS to Hard Disk" {
              linux /boot/vmlinuz root=/dev/ram0 init=/install.sh
              initrd /boot/initrd.img
          }
          EOF
          genisoimage -o DuyKhanhOS-arm64.iso -b boot/grub/grub.cfg iso/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v5.0-final
          release_name: DuyKhanhOS v5.0-final
          body: |
            🚀 DuyKhanhOS ARM64 Cyberpunk Edition
            - Desktop: Kali-Cyberpunk XFCE
            - Packages: kali-desktop-manager, chromium, ibus-unikey, zsh, kali-tools-top10
            - Theme: Arc + Papirus
            - Boot Menu: Try Live / Install to Disk
          draft: false
          prerelease: false

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: DuyKhanhOS-arm64.iso
          asset_name: DuyKhanhOS-arm64.iso
          asset_content_type: application/octet-stream

  generate-art:
    runs-on: ubuntu-latest
    needs: build-arm64-os
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      - name: Render Cyberpunk GUI Art
        run: |
          python scripts/render_gui.py

      - name: Upload GUI Art to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.build-arm64-os.outputs.upload_url }}
          asset_path: output/gui.png
          asset_name: DuyKhanhOS-GUI-Art.png
          asset_content_type: image/png
