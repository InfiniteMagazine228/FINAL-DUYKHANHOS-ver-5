name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cac cong cu can thiet de tao UEFI Hybrid ISO
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools genisoimage xorriso isolinux imagemagick fonts-liberation mtools grub-pc-bin grub-efi-amd64-bin dosfstools

      - name: 3. Dung Docker dung loi Live-boot chuan cua Kali
        run: |
          mkdir -p source/iso/live source/squashfs output mnt
          
          # Tải Docker sạch từ máy chủ chính chủ
          docker pull kalilinux/kali-rolling:latest
          docker run --name kalicore -d kalilinux/kali-rolling:latest tail -f /dev/null
          
          # Cài các gói mồi lõi hệ thống nền tảng
          docker exec kalicore apt-get update
          docker exec kalicore apt-get install -y --no-install-recommends linux-image-amd64 live-boot live-config init systemd fastfetch

          # Trích xuất cấu trúc hệ thống hoàn chỉnh ra máy ảo Actions
          docker cp kalicore:/ source/squashfs/
          docker rm -f kalicore

      - name: 4. Fix loi SSL va ep nạp chuan xác file packages.chroot cua ban
        run: |
          # Đọc danh sách gói ứng cứu từ file cấu hình của bạn
          TARGET_PACKAGES=""
          if [ -f "config/packages.chroot" ]; then
            TARGET_PACKAGES=$(grep -v '^#' config/packages.chroot | grep -v '^$' | tr '\n' ' ')
          fi

          # Ép cấu hình kho lưu trữ sử dụng duy nhất một nguồn HTTP chuẩn, tắt bỏ HTTPS lỗi chứng chỉ SSL
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/apt/sources.list
          deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware
          EOF"

          # Tiến hành chroot cài đặt phần mềm từ repo của bạn và bộ gõ tiếng Việt với cờ bỏ qua kiểm tra an toàn chứng chỉ tạm thời
          sudo chroot source/squashfs /bin/bash -c "
            apt-get update -o Acquire::https::Verify-Peer=false -o Acquire::AllowInsecureRepositories=true || true
            apt-get install -y --allow-unauthenticated kali-archive-keyring || true
            apt-get update
            
            # Cài đặt danh sách phần mềm từ file packages.chroot của bạn (XFCE4, Drivers Wifi, Chromium, kali-wallpapers...)
            if [ ! -z '$TARGET_PACKAGES' ]; then
              apt-get install -y --no-install-recommends $TARGET_PACKAGES
            fi
            
            # Cài bổ sung bộ gõ tiếng Việt và các công cụ hiển thị giao diện cấu hình
            apt-get install -y --no-install-recommends ibus ibus-bamboo zenity
            
            # Khởi tạo liên kết tắt cho lệnh gọi thông tin hệ thống fastfetch
            ln -s /usr/bin/fastfetch /usr/bin/neofetch || true
            
            mkdir -p /etc/lightdm/lightdm.conf.d
            echo -e '[Seat:*]\nautologin-user=root\nautologin-user-timeout=0' > /etc/lightdm/lightdm.conf.d/lightdm-autologin.conf
            
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      - name: 5. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/
          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png
          
          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 6. Khong che phim tat Zalo Web va file About.txt tu Repo ra Desktop
        run: |
          sudo mkdir -p source/squashfs/etc/skel/Desktop
          if [ -d "config/includes.chroot/etc/skel/Desktop" ]; then
            sudo cp -r config/includes.chroot/etc/skel/Desktop/. source/squashfs/etc/skel/Desktop/
          fi

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/zalo.desktop
          [Desktop Entry]
          Name=Zalo Web
          Exec=chromium --no-sandbox https://zalo.me
          Icon=web-browser
          Terminal=false
          Type=Application
          Categories=Network;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/zalo.desktop

          sudo mkdir -p source/squashfs/etc/skel/.config/autostart
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/.config/autostart/ibus.desktop
          [Desktop Entry]
          Type=Application
          Exec=ibus-daemon -drxR
          Name=IBus Bamboo
          EOF"

      - name: 7. Tu tao cau truc BOOT GRUB va Dong goi UEFI Core chuẩn xác
        run: |
          # Nén hệ thống tệp tin Live core thành file squashfs hoàn chỉnh
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs -comp xz
          
          # Đồng bộ hóa chính xác tệp tin nhân vmlinuz và initrd.img
          sudo cp $(find source/squashfs/boot/ -name "vmlinuz*" | head -n 1) source/iso/live/vmlinuz
          sudo cp $(find source/squashfs/boot/ -name "initrd.img*" | head -n 1) source/iso/live/initrd.img

          # Tạo cấu trúc thư mục Boot GRUB tiêu chuẩn
          mkdir -p source/iso/boot/grub
          mkdir -p source/iso/EFI/boot
          
          # Cấu hình tệp tin menu GRUB tiêu chuẩn mồi nhân Linux động
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          insmod iso9660
          insmod linux
          insmod boot
          set timeout=5
          set default=0
          
          menuentry 'FINAL-DUYKHANHOS v5 (By DuyKhanhDevelop)' {
              linux /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF"
          
          # Biên dịch bộ mồi khởi động
          sudo grub-mkimage -o source/iso/EFI/boot/bootx64.efi -p /boot/grub -O x86_64-efi iso9660 normal test loadenv part_msdos part_gpt fat ext2 linux boot configfile echo

          # Tạo ảnh phân vùng FAT efiboot.img chuẩn chỉnh cho UEFI Generation 2
          dd if=/dev/zero of=source/iso/boot/efiboot.img bs=1M count=4
          mkfs.vfat -F 12 source/iso/boot/efiboot.img
          mmd -i source/iso/boot/efiboot.img ::/EFI
          mmd -i source/iso/boot/efiboot.img ::/EFI/boot
          mcopy -i source/iso/boot/efiboot.img source/iso/EFI/boot/bootx64.efi ::/EFI/boot/bootx64.efi

      - name: 8. Dong goi cấu trúc ISO Hybrid xorriso chuan GPT EFI (An ngay tren Hyper-V Gen 2 va Ventoy)
        run: |
          cd source/iso
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "DUYKHANHOS" \
            -eltorito-alt-boot \
            -e boot/efiboot.img \
            -no-emul-boot -isohybrid-gpt-basdat \
            -output "../../output/FINAL-DUYKHANHOS-ver-5.iso" .

      - name: 9. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: |
            🚀 Siêu phẩm cứu hộ máy tính FINAL-DUYKHANHOS v5 độc quyền DuyKhanhDevelop đã Full Fix lỗi ngầm 100%!
            - Vượt qua hoàn toàn bộ kiểm duyệt lỗi chứng chỉ SSL của kho lưu trữ.
            - Nạp đầy đủ bộ giao diện đồ họa XFCE4, trình duyệt Chromium, Driver mạng Wifi và bộ gõ tiếng Việt.
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
