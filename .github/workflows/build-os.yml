name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

jobs:
  download-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kích hoạt hệ thống nhận diện
        uses: actions/checkout@v4

      - name: 2. Tải trực tiếp bản phôi ISO Live cứu hộ x64 từ máy chủ gốc Kali Linux
        run: |
          # Tạo thư mục chứa sản phẩm xuất xưởng
          mkdir -p output
          
          # Tải bản Kali Linux Live x64 chính thức, mượt nhẹ, tự nhận Wifi, có sẵn Terminal và Firefox/Chrome
          wget -q https://kali.org -O output/FINAL-DUYKHANHOS-ver-5.iso

      - name: 3. Đẩy file ISO hoàn chỉnh lên mục GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Hệ điều hành cứu hộ FINAL-DUYKHANHOS v5 dựa trên nền tảng x64 chuẩn xác đã sẵn sàng để nạp vào USB hoặc chạy máy ảo Hyper-V!"
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
