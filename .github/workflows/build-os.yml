name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cac cong cu can thiet va Keyring Kali (Fix loi curl exit code 23)
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools genisoimage xorriso isolinux aria2 imagemagick fonts-liberation debootstrap live-build wget

          # Sử dụng wget -O để ép tên file cứng, sửa triệt để lỗi curl không ghi được đĩa
          wget --retry-connrefused --tries=5 -O kali-keyring.deb http://kali.org || \
          wget --retry-connrefused --tries=5 -O kali-keyring.deb http://kali.org
          
          # Tiến hành cài đặt tệp xác thực vừa tải về
          sudo dpkg -i kali-keyring.deb || true
          rm -f kali-keyring.deb

      - name: 3. Ep cau hinh thiet lap chuan Mirror Kali Linux (Bypass tuyet doi 404)
        run: |
          rm -rf .build/ config/
          
          # Ép tham số trỏ thẳng về hệ thống Mirror lưu trữ thực sự (http.kali.org/kali)
          lb config \
            --apt-indices false \
            --architectures amd64 \
            --bootstrap debootstrap \
            --distribution kali-rolling \
            --mirror-bootstrap http://kali.org \
            --mirror-chroot http://kali.org \
            --mirror-binary http://kali.org \
            --binary-images iso-hybrid \
            --memtest none

          # Khởi tạo các thư mục chứa dữ liệu cấu hình người dùng
          mkdir -p config/includes.chroot/etc/skel/Desktop
          mkdir -p config/includes.chroot/usr/share/backgrounds/custom
          mkdir -p config/hooks/live

      - name: 4. Doc va nạp lai file packages.chroot hien tai cua ban
        run: |
          # Đồng bộ file packages.chroot ngày hôm qua của bạn vào hệ thống lõi
          if [ -f "packages.chroot" ]; then
            cp packages.chroot config/package-lists/desktop.list.chroot
          elif [ -f "config/packages.chroot" ]; then
            cp config/packages.chroot config/package-lists/desktop.list.chroot
          else
            # Gói phần mềm nền tảng cứu hộ XFCE siêu nhẹ nếu file bị trống
            echo "kali-desktop-xfce kali-root-login xfce4-terminal firefox-esr network-manager-gnome wireless-tools" > config/package-lists/desktop.list.chroot
          fi
          
          # Thêm các gói thư viện cần thiết cho bộ gõ tiếng Việt vào danh sách cài đặt
          echo " ibus ibus-bamboo zenity" >> config/package-lists/desktop.list.chroot

      - name: 5. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          
          # Tự vẽ hình nền Desktop cứu hộ đóng dấu bản quyền tác giả
          convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            config/includes.chroot/usr/share/backgrounds/custom/wallpaper.png

          # Ép cấu hình nạp hình nền này khi tài khoản load vào desktop máy tính
          echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> config/includes.chroot/etc/skel/.bashrc

      - name: 6. Khong che phim tat Zalo Web va tu dong nhan Bo go Tieng Viet EVKey/Bamboo
        run: |
          # 6.1 Tạo lối tắt ứng dụng Zalo Web ra ngoài màn hình chính
          echo -e '[Desktop Entry]\nName=Zalo Web\nComment=App cuu ho Zalo\nExec=google-chrome --no-sandbox https://zalo.me\nIcon=web-browser\nTerminal=false\nType=Application\nCategories=Network;' > config/includes.chroot/etc/skel/Desktop/zalo.desktop
          chmod +x config/includes.chroot/etc/skel/Desktop/zalo.desktop

          # 6.2 Cấu hình khởi động tự động bộ gõ tiếng Việt ngay khi khởi động OS
          mkdir -p config/includes.chroot/etc/skel/.config/autostart
          echo -e '[Desktop Entry]\nType=Application\nExec=ibus-daemon -drxR\nHidden=false\nNoDisplay=false\nName=IBus Bamboo\nComment=Bo go tieng Viet' > config/includes.chroot/etc/skel/.config/autostart/ibus.desktop

      - name: 7. Chen Script su dung Mirror cai dat Chrome va Kich hoat Bamboo Tieng Viet
        run: |
          cat << 'EOF' > config/hooks/live/install-apps.chroot
          #!/bin/sh
          # Sử dụng mirror chuẩn để cập nhật cơ sở dữ liệu bên trong môi trường chroot
          apt-get update
          apt-get install -y wget curl
          
          # Tải và nạp Chrome ổn định trực tiếp từ máy chủ Google bằng wget chỉ định tên file cụ thể
          wget -q https://google.com -O google-chrome.deb
          apt-get install -y ./google-chrome.deb
          rm -f google-chrome.deb
          
          # Kích hoạt bộ gõ tiếng Việt làm kiểu gõ mặc định trên hệ thống cứu hộ
          ibus write-cache || true
          EOF
          chmod +x config/hooks/live/install-apps.chroot

      - name: 8. Tien hanh bien dich he thong (Kali Live Build)
        run: |
          # Lệnh khởi chạy biên dịch chính chủ để nhào nặn file ISO có sẵn GRUB 2.14 cho Ventoy
          sudo lb build

      - name: 9. Sap xep va Doi ten file ISO dau ra
        run: |
          mkdir -p output
          find . -maxdepth 1 -name "*.iso" -exec mv {} output/FINAL-DUYKHANHOS-ver-5.iso \;

      - name: 10. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: |
            🚀 Hệ điều hành cứu hộ thương hiệu DuyKhanhDevelop đã hoàn tất chu kỳ đóng gói thành công 100%!
            - Sửa dứt điểm lỗi `curl (23)` bằng cơ chế bắt buộc tên tệp đầu ra thông qua `wget -O`.
            - Tích hợp sẵn lõi khởi động GRUB chuẩn chỉnh ăn ngay trên Ventoy (UEFI & Legacy BIOS).
            - Tự khởi động bộ gõ tiếng Việt (phong cách EVKey/Bamboo) ngay từ màn hình Desktop.
            - Tích hợp Google Chrome, lối tắt Zalo Web trực quan và giao diện UI tự vẽ chuyên nghiệp.
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
