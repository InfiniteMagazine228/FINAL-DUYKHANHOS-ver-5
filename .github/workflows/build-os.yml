name: Build DuyKhanhOS

on:
  workflow_dispatch:

jobs:
  build-arm64-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup ARM64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu \
            genisoimage debootstrap

      - name: Build Custom Kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)
          mkdir -p output/kernel
          cp arch/arm64/boot/Image output/kernel/

      - name: Create RootFS with GUI + Apps
        run: |
          sudo debootstrap --arch=arm64 stable rootfs http://deb.debian.org/debian
          sudo chroot rootfs apt-get update
          sudo chroot rootfs apt-get install -y kali-desktop-manager xfce4 lightdm
          sudo chroot rootfs apt-get install -y chromium ibus-unikey zsh kali-tools-top10
          sudo chroot rootfs apt-get install -y arc-theme papirus-icon-theme
          echo "DuyKhanhOS Cyberpunk XFCE" > rootfs/etc/motd

      - name: Package ISO
        run: |
          mkdir -p iso/boot
          cp output/kernel/Image iso/boot/
          genisoimage -o DuyKhanhOS-arm64.iso -b boot/Image iso/

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v5.0-final
          release_name: DuyKhanhOS v5.0-final
          body: |
            🚀 DuyKhanhOS ARM64 Cyberpunk Edition
            - Kernel: Custom-Core ARM64
            - Desktop: Kali-Cyberpunk XFCE
            - Packages: kali-desktop-manager, chromium, ibus-unikey, zsh, kali-tools-top10
            - Theme: Arc + Papirus
          draft: false
          prerelease: false

      - name: Upload ISO to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: DuyKhanhOS-arm64.iso
          asset_name: DuyKhanhOS-arm64.iso
          asset_content_type: application/octet-stream

  generate-art:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install pillow

      - name: Render Cyberpunk GUI Art
        run: |
          python scripts/render_gui.py

      - name: Upload GUI Art
        uses: actions/upload-artifact@v4
        with:
          name: DuyKhanhOS-GUI-Art
          path: output/gui.png
