name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cong cu
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso isolinux \
            imagemagick fonts-liberation mtools \
            grub-pc-bin grub-efi-amd64-bin dosfstools \
            live-build

      - name: 3. Tao rootfs bang debootstrap truc tiep (Khong qua Docker)
        run: |
          mkdir -p source/squashfs source/iso/live source/iso/boot/grub source/iso/EFI/boot output

          # Dung debootstrap tao rootfs Debian/Kali chuan, tranh loi Docker layer
          sudo debootstrap \
            --arch=amd64 \
            --include=linux-image-amd64,live-boot,live-boot-initramfs-tools,live-config,live-config-systemd,live-tools,systemd-sysv,init \
            kali-rolling \
            source/squashfs \
            http://http.kali.org/kali

      - name: 4. Chroot cai phan mem chinh
        run: |
          CONFIG_FILE="config/packages.chroot"
          TARGET_PACKAGES=""
          if [ -f "$CONFIG_FILE" ]; then
            TARGET_PACKAGES=$(grep -v '^#' "$CONFIG_FILE" | grep -v '^$' | tr '\n' ' ')
          else
            TARGET_PACKAGES="kali-desktop-xfce lightdm xfce4-terminal thunar network-manager-gnome firmware-linux chromium"
          fi

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/apt/sources.list
          deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware
          EOF"

          # Mount can thiet de chroot hoat dong day du
          sudo mount --bind /proc    source/squashfs/proc
          sudo mount --bind /sys     source/squashfs/sys
          sudo mount --bind /dev     source/squashfs/dev
          sudo mount --bind /dev/pts source/squashfs/dev/pts
          sudo mount --bind /run     source/squashfs/run

          sudo chroot source/squashfs /bin/bash << CHROOT
            export DEBIAN_FRONTEND=noninteractive
            apt-get update

            # Cai phan mem chinh
            apt-get install -y --no-install-recommends $TARGET_PACKAGES

            # Bo go tieng Viet
            apt-get install -y --no-install-recommends ibus ibus-unikey zenity

            # Calamares installer GUI
            apt-get install -y --no-install-recommends \
              calamares parted grub-pc grub-efi-amd64 os-prober

            # fastfetch + neofetch symlink
            apt-get install -y --no-install-recommends fastfetch || true
            ln -s /usr/bin/fastfetch /usr/bin/neofetch 2>/dev/null || true

            # === FIX: Mo khoa root ===
            passwd -d root
            passwd -u root
            echo 'root:root' | chpasswd

            # === FIX: Autologin root Desktop ===
            mkdir -p /etc/lightdm/lightdm.conf.d
            printf '[Seat:*]\nautologin-user=root\nautologin-user-timeout=0\n' \
              > /etc/lightdm/lightdm.conf.d/autologin.conf

            # === FIX CHINH: Rebuild initrd voi live-boot da cai day du ===
            KERNEL_VER=\$(ls /lib/modules/ | sort -V | tail -n 1)
            echo "==> Kernel: \$KERNEL_VER"
            update-initramfs -u -k \$KERNEL_VER

            # Kiem tra /init ton tai trong initrd
            echo "==> Kiem tra live-boot /init trong initrd:"
            lsinitramfs /boot/initrd.img-\$KERNEL_VER | grep "^init$" || echo "WARN: /init khong tim thay!"

            apt-get clean
            rm -rf /var/lib/apt/lists/*
          CHROOT

          # Umount theo thu tu nguoc
          sudo umount source/squashfs/run     || true
          sudo umount source/squashfs/dev/pts || true
          sudo umount source/squashfs/dev     || true
          sudo umount source/squashfs/sys     || true
          sudo umount source/squashfs/proc    || true

      - name: 5. Cau hinh Calamares
        run: |
          sudo mkdir -p source/squashfs/etc/calamares/modules

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/calamares/settings.conf
          modules-search: [ local, /usr/lib/calamares/modules ]
          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - partition
              - users
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - users
              - displaymanager
              - networkcfg
              - hwclock
              - grubcfg
              - bootloader
              - packages
              - removeuser
              - unmount
            - show:
              - finished
          branding: kali
          prompt-install: true
          EOF"

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/calamares/modules/unpackfs.conf
          unpack:
            - source: /run/live/medium/live/filesystem.squashfs
              sourcefs: squashfs
              destination: ''
          EOF"

          sudo mkdir -p source/squashfs/etc/skel/Desktop
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/install.desktop
          [Desktop Entry]
          Name=Install DUYKHANHOS to Disk
          Exec=pkexec calamares
          Icon=system-software-install
          Terminal=false
          Type=Application
          Categories=System;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/install.desktop

      - name: 6. Dong bo file tu Repo va Zalo shortcut
        run: |
          sudo mkdir -p source/squashfs/etc/skel/Desktop

          ABOUT_DIR="config/includes.chroot/etc/skel/Desktop"
          if [ -d "$ABOUT_DIR" ]; then
            sudo cp -r "$ABOUT_DIR"/. source/squashfs/etc/skel/Desktop/
          fi

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/zalo.desktop
          [Desktop Entry]
          Name=Zalo Web
          Exec=chromium --no-sandbox https://zalo.me
          Icon=web-browser
          Terminal=false
          Type=Application
          Categories=Network;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/zalo.desktop

          sudo mkdir -p source/squashfs/etc/skel/.config/autostart
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/.config/autostart/ibus.desktop
          [Desktop Entry]
          Type=Application
          Exec=ibus-daemon -drxR
          Name=IBus Unikey
          EOF"

      - name: 7. Custom UI - DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/

          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center \
            -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center \
            -draw "text 0,20 'WIN THE RESCUE SYSTEM - INSTALLER EDITION'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast \
            -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png

          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image \
              -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 8. Dong goi squashfs + Copy initrd chinh xac
        run: |
          # Lay dung kernel version
          KERNEL_VER=$(ls source/squashfs/lib/modules/ | sort -V | tail -n 1)
          echo "==> Su dung Kernel: $KERNEL_VER"

          # Nen squashfs
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs \
            -comp gzip -processors 4 -e proc -e sys -e dev -e run

          # Copy vmlinuz va initrd chinh xac theo kernel version
          sudo cp source/squashfs/boot/vmlinuz-${KERNEL_VER} source/iso/live/vmlinuz
          sudo cp source/squashfs/boot/initrd.img-${KERNEL_VER} source/iso/live/initrd.img

          echo "==> Kiem tra initrd size (phai > 50MB):"
          ls -lh source/iso/live/

          # Kiem tra /init co trong initrd
          echo "==> Kiem tra /init trong initrd:"
          lsinitramfs source/iso/live/initrd.img | grep "^init$" && \
            echo "OK: /init ton tai" || echo "FAILED: /init khong co!"

          # GRUB menu
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          insmod iso9660
          insmod linux
          insmod all_video
          set timeout=10
          set default=0

          menuentry 'Install DUYKHANHOS v5 to Hard Disk ( Tải về ổ cứng ) ' {
              linux /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }

          menuentry 'Try DUYKHANHOS v5 (Without Installing) (Thử % Tải)' {
              linux /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }

          menuentry 'Safe Mode (nomodeset)' {
              linux /live/vmlinuz boot=live components nomodeset
              initrd /live/initrd.img
          }
          EOF"

          # UEFI bootloader
          sudo grub-mkimage \
            -o source/iso/EFI/boot/bootx64.efi \
            -p /boot/grub \
            -O x86_64-efi \
            iso9660 normal test loadenv part_msdos part_gpt \
            fat ext2 linux boot configfile echo all_video

          dd if=/dev/zero of=source/iso/boot/efiboot.img bs=1M count=4
          mkfs.vfat -F 12 source/iso/boot/efiboot.img
          mmd -i source/iso/boot/efiboot.img ::/EFI
          mmd -i source/iso/boot/efiboot.img ::/EFI/boot
          mcopy -i source/iso/boot/efiboot.img \
            source/iso/EFI/boot/bootx64.efi ::/EFI/boot/bootx64.efi

      - name: 9. Dong goi ISO Hybrid
        run: |
          cd source/iso
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "DUYKHANHOS" \
            -eltorito-alt-boot \
            -e boot/efiboot.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            -output "../../output/FINAL-DUYKHANHOS-ver-5-INSTALLER.iso" .

      - name: 10. Day ISO len GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-installer
          name: FINAL-DUYKHANHOS-ver-5-INSTALLER
          body: |
            🚀 BẢN CHÍNH THỨC ĐÃ CÓ !!!
            - ✅ Dùng debootstrap thay Docker → rootfs chuẩn 100%
            - ✅ live-boot-initramfs-tools cài từ đầu → /init có trong initrd
            - ✅ Rebuild initrd sau cài đặt → không còn Kernel Panic
            - ✅ Root mở khóa, autologin Desktop
            - ✅ Calamares cài thẳng lên ổ cứng
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
