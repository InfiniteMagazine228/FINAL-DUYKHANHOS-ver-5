name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Nut bam thu cong cho DuyKhanh

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kiem tra ma nguon kho luu tru DuyKhanh OS
        uses: actions/checkout@v4

      - name: 2. Chuyen doi quyen thuc thi va chay Docker Makefile
        run: |
          # Cap quyen doc/ghi/chay tuyệt đối cho thu muc lam viec truoc khi vao Docker
          chmod -R 777 ${{ github.workspace }}
          
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            kalilinux/kali-rolling:latest bash -c "
              apt-get update && apt-get install -y make && \
              make build
            "

      - name: 3. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Ban dựng FULL FIX 100% thanh cong voi Xcode Makefile! Da sua loi 127 va 2."
          files: live-build/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
