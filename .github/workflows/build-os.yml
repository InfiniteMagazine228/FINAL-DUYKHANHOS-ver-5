name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cac cong cu can thiet de va GRUB va UI tại chỗ
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools genisoimage xorriso isolinux imagemagick fonts-liberation mtools grub-pc-bin grub-efi-amd64-bin

      - name: 3. Su dung Docker de trich xuat loi Kali Linux chinh chu (Bypass 100% loi Mirror 404)
        run: |
          mkdir -p source/iso/live source/squashfs output
          
          # Khởi chạy Docker container bản chính thức của Kali Linux để lấy lõi sạch
          docker run --name kalicore -d kali-linux/kali-rolling:latest tail -f /dev/null
          
          # Cập nhật và cài đặt sẵn các gói hạt nhân Kernel bên trong Docker trước khi trích xuất
          docker exec kalicore apt-get update
          docker exec kalicore apt-get install -y linux-image-amd64 live-boot

          # Sao chép toàn bộ lõi hệ thống từ Docker container ra thư mục build của GitHub Actions
          docker cp kalicore:/ source/squashfs/
          docker rm -f kalicore

      - name: 4. Doc va nap phan mem tu file packages.chroot cua ban vao loi OS
        run: |
          # Đọc danh sách gói ứng cứu từ file cấu hình của bạn
          TARGET_PACKAGES=""
          if [ -f "config/packages.chroot" ]; then
            TARGET_PACKAGES=$(grep -v '^#' config/packages.chroot | grep -v '^$' | tr '\n' ' ')
          fi

          # Ép môi trường chroot thực hiện cài đặt các ứng dụng yêu cầu
          sudo chroot source/squashfs /bin/bash -c "
            # Khóa chặt nguồn Mirror chuẩn bên trong lõi
            echo 'deb http://kali.org kali-rolling main contrib non-free non-free-firmware' > /etc/apt/sources.list
            apt-get update
            
            # Cài đặt danh sách phần mềm từ repo của bạn (XFCE, Drivers Wifi, Chromium...)
            if [ ! -z '$TARGET_PACKAGES' ]; then
              apt-get install -y $TARGET_PACKAGES
            fi
            
            # Cài đặt thêm bộ gõ tiếng Việt IBus-Bamboo cho hệ thống cứu hộ
            apt-get install -y ibus ibus-bamboo zenity
            
            # Cấu hình tự động đăng nhập thẳng vào Desktop với quyền Root (Bypass LightDM)
            mkdir -p /etc/lightdm/lightdm.conf.d
            echo -e '[Seat:*]\nautologin-user=root\nautologin-user-timeout=0' > /etc/lightdm/lightdm.conf.d/lightdm-autologin.conf
            
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      - name: 5. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          
          # Tự vẽ hình nền Desktop cứu hộ đóng dấu bản quyền tác giả DuyKhanhDevelop
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/
          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png
          
          # Thiết lập cấu hình hệ thống tự nhận diện tấm ảnh nền này làm mặc định cho người dùng
          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 6. Khong che phim tat Zalo Web va file About.txt từ Repo ra Desktop
        run: |
          # Đồng bộ thư mục chứa file About.txt có sẵn từ Repo của bạn vào màn hình chính
          sudo mkdir -p source/squashfs/etc/skel/Desktop
          if [ -d "config/includes.chroot/etc/skel/Desktop" ]; then
            sudo cp -r config/includes.chroot/etc/skel/Desktop/. source/squashfs/etc/skel/Desktop/
          fi

          # Tạo phím tắt Zalo Web chạy bằng Chromium (đã khai báo trong packages.chroot của bạn)
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/zalo.desktop
          [Desktop Entry]
          Name=Zalo Web
          Comment=App cuu ho Zalo
          Exec=chromium --no-sandbox https://zalo.me
          Icon=web-browser
          Terminal=false
          Type=Application
          Categories=Network;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/zalo.desktop

          # Cấu hình tự động bật bộ gõ tiếng Việt ngay khi khởi động
          sudo mkdir -p source/squashfs/etc/skel/.config/autostart
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/.config/autostart/ibus.desktop
          [Desktop Entry]
          Type=Application
          Exec=ibus-daemon -drxR
          Hidden=false
          NoDisplay=false
          Name=IBus Bamboo
          Comment=Bo go tieng Viet
          EOF"

      - name: 7. Tu sinh bo nap khoi dong GRUB va dong goi lõi SquashFS
        run: |
          # Nén hệ thống tệp tin Live core thành file squashfs
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs -comp xz
          
          # Tự tạo cấu hình menu GRUB 2.x nguyên bản tương thích 100% với Ventoy
          mkdir -p source/iso/boot/grub
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          set timeout=5
          set default=0
          
          insmod ext2
          insmod loopback
          insmod iso9660
          
          menuentry 'FINAL-DUYKHANHOS v5 (By DuyKhanhDevelop)' {
              linux /live/vmlinuz boot=live quiet splash
              initrd /live/initrd.img
          }
          menuentry 'Khoi dong lai PC (Reboot)' {
              reboot
          }
          EOF"
          
          # Trích xuất nhân Kernel và Ramdisk từ lõi chroot ra ngoài phân vùng boot của ISO
          sudo cp source/squashfs/boot/vmlinuz* source/iso/live/vmlinuz
          sudo cp source/squashfs/boot/initrd.img* source/iso/live/initrd.img

      - name: 8. Dong goi cấu trúc ISO Hybrid tiêu chuẩn cho Ventoy bằng grub-mkrescue
        run: |
          cd source/iso
          # Tạo tệp tin ISO hoàn chỉnh chứa sẵn lõi nạp GRUB ăn ngay ngoài USB Ventoy
          sudo grub-mkrescue -o "../../output/FINAL-DUYKHANHOS-ver-5.iso" .

      - name: 9. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: |
            🚀 Siêu phẩm cứu hộ máy tính FINAL-DUYKHANHOS v5 độc quyền DuyKhanhDevelop đã chính thức phát hành!
            - Giải quyết triệt để 100% lỗi debootstrap `Failed getting release file` bằng giải pháp trích xuất lõi Docker Container chính chủ.
            - Tích hợp nhân khởi động GRUB tùy biến tự tạo, tương thích hoàn hảo cực mượt trên USB Ventoy (UEFI + Legacy).
            - Nạp chuẩn danh sách ứng dụng trong packages.chroot (XFCE4, Driver Wifi, Chromium...).
            - Đã tích hợp file thông tin About.txt từ repo và bộ gõ tiếng Việt tự bật ngoài Desktop.
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
