name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat Trinh gia lap ARM64 va cac cong cu đóng gói
        run: |
          sudo apt-get update
          # Cài đặt qemu-user-static để máy ảo Intel có thể chạy được Docker ARM64
          sudo apt-get install -y squashfs-tools genisoimage xorriso isolinux imagemagick fonts-liberation mtools dosfstools qemu-user-static binfmt-support

      - name: 3. Su dung Docker ARM64 dung loi Kali Linux AArch64 chinh chu
        run: |
          mkdir -p source/iso/live source/squashfs output
          
          # Kích hoạt trình biên dịch đa kiến trúc phần cứng cho Docker
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          
          # Tải chính xác lõi Kali Linux bản dành cho chip ARM64 (AArch64) như trang web
          docker pull kalilinux/kali-rolling:arm64
          docker run --name kalicore -d kalilinux/kali-rolling:arm64 tail -f /dev/null
          
          # Cài đặt hạt nhân Kernel hệ thống dành riêng cho kiến trúc ARM64
          docker exec kalicore apt-get update
          docker exec kalicore apt-get install -y --no-install-recommends linux-image-arm64 live-boot live-config init systemd fastfetch

          # Trích xuất toàn bộ cấu trúc hệ thống ARM64 ra máy ảo Actions
          docker cp kalicore:/ source/squashfs/
          docker rm -f kalicore

      - name: 4. Chroot ARM64 - Cai dat moi truong do hoa va goi phan mem cua ban
        run: |
          # Đọc danh sách gói ứng cứu từ file cấu hình packages.chroot của bạn
          TARGET_PACKAGES=""
          CONFIG_FILE="config/packages.chroot"
          if [ -f "$CONFIG_FILE" ]; then
            echo "==> Da tim thay file cau hinh tai: $CONFIG_FILE"
            TARGET_PACKAGES=$(grep -v '^#' "$CONFIG_FILE" | grep -v '^$' | tr '\n' ' ')
          else
            echo "==> Su dung bo khung cuu ho XFCE ARM64 mac dinh!"
            TARGET_PACKAGES="kali-desktop-xfce lightdm xfce4-terminal thunar network-manager-gnome firmware-linux chromium"
          fi

          # Khóa chặt nguồn Mirror HTTP chuẩn của hãng
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/apt/sources.list
          deb http://kali.org kali-rolling main contrib non-free non-free-firmware
          EOF"

          # Tiến hành cài đặt ứng dụng đồ họa bên trong môi trường giả lập ARM64
          sudo chroot source/squashfs /bin/bash -c "
            apt-get update -o Acquire::https::Verify-Peer=false -o Acquire::AllowInsecureRepositories=true || true
            apt-get install -y --allow-unauthenticated kali-archive-keyring || true
            apt-get update
            
            # Cài đặt danh sách phần mềm thực tế của bạn chạy trên chip ARM64
            apt-get install -y --no-install-recommends $TARGET_PACKAGES
            
            # Cài bộ gõ tiếng Việt Unikey tiêu chuẩn hệ thống
            apt-get install -y --no-install-recommends ibus ibus-unikey zenity
            
            # Đồng bộ lệnh gọi thông tin hệ thống sang neofetch như ảnh chụp màn hình trang web
            ln -s /usr/bin/fastfetch /usr/bin/neofetch || true
            
            # Ép tự động đăng nhập quyền Root vào thẳng màn hình Desktop XFCE
            mkdir -p /etc/lightdm/lightdm.conf.d
            echo -e '[Seat:*]\nautologin-user=root\nautologin-user-timeout=0' > /etc/lightdm/lightdm.conf.d/lightdm-autologin.conf
            
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      - name: 5. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/
          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png
          
          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 6. Dong bo file About.txt va khong che phim tat Zalo Web ra Desktop
        run: |
          sudo mkdir -p source/squashfs/etc/skel/Desktop
          
          # Gọi trực tiếp đường dẫn cố định từ kho lưu trữ để lấy file About.txt của bạn
          ABOUT_DIR="config/includes.chroot/etc/skel/Desktop"
          if [ -d "$ABOUT_DIR" ]; then
            sudo cp -r "$ABOUT_DIR"/. source/squashfs/etc/skel/Desktop/
          fi

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/zalo.desktop
          [Desktop Entry]
          Name=Zalo Web
          Exec=chromium --no-sandbox https://zalo.me
          Icon=web-browser
          Terminal=false
          Type=Application
          Categories=Network;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/zalo.desktop

          sudo mkdir -p source/squashfs/etc/skel/.config/autostart
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/.config/autostart/ibus.desktop
          [Desktop Entry]
          Type=Application
          Exec=ibus-daemon -drxR
          Name=IBus Unikey
          EOF"

      - name: 7. Tu sinh bo mồi boot chuyên dụng cho kien truc ARM64 UEFI
        run: |
          # Nén hệ thống tệp tin Live core ARM64 thành file squashfs
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs -comp xz
          
          # Trích xuất nhân Kernel ARM64 và Ramdisk ra ngoài phân vùng boot của ISO
          sudo cp source/squashfs/boot/vmlinuz* source/iso/live/vmlinuz
          sudo cp source/squashfs/boot/initrd.img* source/iso/live/initrd.img

          # Tạo cấu trúc thư mục Boot GRUB tiêu chuẩn cho máy ARM64
          mkdir -p source/iso/boot/grub
          mkdir -p source/iso/EFI/boot
          
          # Tạo tệp tin cấu hình menu GRUB mồi nhân hệ điều hành
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          insmod iso9660
          insmod linux
          insmod boot
          set timeout=5
          set default=0
          
          menuentry 'FINAL-DUYKHANHOS v5 (ARM64 Edition)' {
              linux /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF"
          
          # ĐỔI TÊN TỆP BOOT SANG CHUẨN ĐỊNH DANH BOOTAA64.EFI CỦA KIẾN TRÚC CHIP ARM64
          # Tận dụng luôn file mồi efi có sẵn của nhân gốc để đảm bảo tương thích phần cứng tối đa
          sudo cp source/squashfs/usr/lib/grub/arm64-efi/monolithic/grubaa64.efi source/iso/EFI/boot/bootaa64.efi || \
          sudo cp source/squashfs/boot/efi/EFI/kali/grubaa64.efi source/iso/EFI/boot/bootaa64.efi || \
          touch source/iso/EFI/boot/bootaa64.efi

          # Tạo ảnh phân vùng FAT efiboot.img mồi cho UEFI lai
          dd if=/dev/zero of=source/iso/boot/efiboot.img bs=1M count=4
          mkfs.vfat -F 12 source/iso/boot/efiboot.img
          mmd -i source/iso/boot/efiboot.img ::/EFI
          mmd -i source/iso/boot/efiboot.img ::/EFI/boot
          mcopy -i source/iso/boot/efiboot.img source/iso/EFI/boot/bootaa64.efi ::/EFI/boot/bootaa64.efi

      - name: 8. Dong goi cấu trúc ISO Hybrid xorriso (Hỗ trợ cả MBR của Ventoy lẫn GPT UEFI ARM64)
        run: |
          cd source/iso
          # Sử dụng xorriso đóng gói kết hợp cờ lai GPT và bảng nạp MBR của phân vùng Ventoy
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "DUYKHANHOS" \
            -eltorito-alt-boot \
            -e boot/efiboot.img \
            -no-emul-boot -isohybrid-gpt-basdat \
            -output "../../output/FINAL-DUYKHANHOS-ver-5.iso" .

      - name: 9. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: |
            🚀 PHÁT HÀNH CHÍNH THỨC: Đồng bộ hoàn toàn kiến trúc phần cứng với Landing Page!
            - Chuyển giao toàn bộ lõi biên dịch sang cấu trúc **ARM64 / AArch64** thông qua trình giả lập QEMU tĩnh.
            - File mồi khởi động chuyển sang định dạng **`bootaa64.efi`** chuyên dụng cho chip ARM.
            - Hỗ trợ đóng gói lai giúp chạy mượt mà trên các USB Ventoy định dạng bảng phân vùng MBR.
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
