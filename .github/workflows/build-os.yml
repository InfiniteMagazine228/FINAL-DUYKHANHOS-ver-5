name: Build DuyKhanhOS XFCE

on:
  push:
    branches:
      - main


jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start build timer
        run: echo "Build started at: $(date)"

      - name: Prepare rootfs mounts
        run: |
          sudo mkdir -p rootfs/proc rootfs/sys rootfs/dev rootfs/dev/pts
          sudo mount -t proc /proc rootfs/proc
          sudo mount -t sysfs /sys rootfs/sys
          sudo mount --bind /dev rootfs/dev
          sudo mount --bind /dev/pts rootfs/dev/pts

      - name: Customize motd
        run: |
          echo "Welcome to DuyKhanhOS XFCE" | sudo tee rootfs/etc/motd

      - name: Install XFCE desktop and apps
        run: |
          sudo chroot rootfs apt-get update
          sudo chroot rootfs apt-get install -y \
            task-xfce-desktop lightdm xfce4-terminal zsh chromium ibus-unikey \
            arc-theme papirus-icon-theme

      - name: Cleanup mounts
        run: |
          sudo umount rootfs/proc || true
          sudo umount rootfs/sys || true
          sudo umount rootfs/dev/pts || true
          sudo umount rootfs/dev || true

      - name: Build ISO with GRUB
        run: |
          mkdir -p iso/boot/grub
          cp rootfs/boot/vmlinuz-* iso/boot/vmlinuz
          cp rootfs/boot/initrd.img-* iso/boot/initrd.img
          echo 'set default=0
          set timeout=5
          menuentry "Try Live" {
            linux /boot/vmlinuz boot=live
            initrd /boot/initrd.img
          }
          menuentry "Install to Disk" {
            linux /boot/vmlinuz boot=install
            initrd /boot/initrd.img
          }' > iso/boot/grub/grub.cfg
          grub-mkrescue -o DuyKhanhOS.iso iso

      - name: End build timer
        run: echo "Build finished at: $(date)"
