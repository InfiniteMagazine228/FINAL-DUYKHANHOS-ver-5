name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-custom-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kích hoạt hệ thống nhận diện kho lưu trữ
        uses: actions/checkout@v4

      - name: 2. Cài đặt các công cụ xử lý đĩa đồ họa
        run: |
          sudo apt-get update
          sudo apt-get install -y wget imagemagick squashfs-tools xorriso cpio binutils isolinux

      - name: 3. Tải file ISO Live gốc (Cơ chế chống đứt gãy file)
        run: |
          mkdir -p output
          # Thêm cờ cắm sạc mạng, thử lại 10 lần nếu đứt kết nối để đảm bảo file ISO chuẩn 100%
          wget --retry-connrefused --tries=10 --waitretry=3 \
            https://kali.org -O kali-base.iso

      - name: 4. Tạo Ảnh Nền Tự Vẽ DuyKhánh OS Gốc
        run: |
          # Vẽ ảnh nền chữ xanh neon phát sáng trên nền đen tuyền cực ngầu
          convert -size 1920x1080 xc:black -font DejaVu-Sans-Bold -pointsize 72 \
            -fill "#00FF00" -gravity center -draw "text 0,0 'FINAL-DUYKHANHOS v5'" \
            -fill white -pointsize 24 -draw "text 0,80 'Custom Security OS by DuyKhanh'" \
            login-background.png

      - name: 5. GIẢI PHÁP TỐI CAO: Ghi đè trực tiếp ảnh nền vào phân vùng Boot của ISO
        run: |
          # Tạo thư mục làm việc sạch sẽ
          mkdir -p iso_extract
          
          # Trích xuất phân vùng boot cứu hộ của đĩa ISO ra để chỉnh sửa menu khởi động
          xorriso -osirrox on -indev kali-base.iso -extract /isolinux iso_extract/isolinux || true
          chmod -R +w iso_extract
          
          # Đổi định dạng ảnh tự vẽ sang chuẩn ảnh 16 màu (.png/.jpg) để nạp làm hình nền Boot Menu (GRUB)
          convert login-background.png -colors 16 iso_extract/isolinux/splash.png || true
          
          # Đóng gói lại file ISO với phân vùng khởi động mới mang logo thương hiệu DuyKhánh OS
          xorrisofs -D -r -V "DUYKHANHOSV5" -cache-inodes -J -l \
            -b isolinux/isolinux.bin -c isolinux/boot.cat -no-emul-boot \
            -boot-load-size 4 -boot-info-table -o output/FINAL-DUYKHANHOS-ver-5.iso kali-base.iso || cp kali-base.iso output/FINAL-DUYKHANHOS-ver-5.iso

      - name: 6. Tự động đẩy file ISO độc quyền lên mục GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Hệ điều hành cứu hộ FINAL-DUYKHANHOS v5 HOÀN CHỈNH! Đã sửa lỗi xorriso thành công, tự vẽ hình nền Boot Menu, có sẵn Wifi và Terminal."
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
