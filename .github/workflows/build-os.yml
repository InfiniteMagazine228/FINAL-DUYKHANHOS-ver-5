name: Build FINAL-DUYKHANHOS v5

on:
  workflow_dispatch: # Bấm nút Run thủ công trên giao diện GitHub

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kiểm tra mã nguồn kho lưu trữ DuyKhánh OS
        uses: actions/checkout@v4

      - name: 2. Cài đặt hệ thống lõi Live-Build và vẽ ảnh
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap imagemagick wget gnupg

      - name: 3. Cập nhật và Cài đặt Khóa ký số GPG mới nhất của Kali
        run: |
          sudo mkdir -p /usr/share/keyrings
          # Tải trực tiếp khóa bảo mật mới nhất để tránh lỗi Unknown Key (ED65462EC8D5E4C5)
          sudo wget -q https://kali.org -O /usr/share/keyrings/kali-archive-keyring.gpg

      - name: 4. Thiết lập cấu hình hệ thống (Sửa lỗi trộn nguồn & Rút gọn tên ISO)
        run: |
          mkdir -p live-build
          cd live-build
          
          # Cấu hình đóng gói chuẩn hóa: Tắt bảo mật/cập nhật phụ của Ubuntu, đổi tên đĩa thành DUYKHANHOSv5
          lb config --architecture amd64 \
                    --distribution kali-rolling \
                    --binary-images iso-hybrid \
                    --iso-volume "DUYKHANHOSv5" \
                    --mirror-bootstrap "http://kali.org" \
                    --mirror-chroot "http://kali.org" \
                    --mirror-binary "http://kali.org" \
                    --security false \
                    --updates false \
                    --archive-areas "main contrib non-free non-free-firmware" \
                    --bootstrap-keyring "/usr/share/keyrings/kali-archive-keyring.gpg" \
                    --apt-options "--yes --dont-sign-with-each-snapshot --allow-unauthenticated --fix-missing"

      - name: 5. Tự động vẽ hình nền và logo thương hiệu DuyKhánh OS
        run: |
          TARGET_DIR="live-build/config/includes.chroot/usr/share/images/desktop-base"
          mkdir -p $TARGET_DIR
          
          # Vẽ ảnh nền máy tính & màn hình đăng nhập (Chữ xanh neon phát sáng trên nền đen)
          convert -size 1920x1080 xc:black -font DejaVu-Sans-Bold -pointsize 72 \
          -fill "#00FF00" -gravity center -draw "text 0,0 'FINAL-DUYKHANHOS v5'" \
          -fill white -pointsize 24 -draw "text 0,80 'Custom Security OS by DuyKhanh'" \
          $TARGET_DIR/login-background.png
          
          # Sao chép đồng bộ làm hình nền mặc định cho hệ thống
          cp $TARGET_DIR/login-background.png $TARGET_DIR/kali-wallpaper-16x9.png

          # Vẽ logo vuông nhỏ cho Start Menu
          convert -size 512x512 xc:black -font DejaVu-Sans-Bold -pointsize 48 \
          -fill "#00FF00" -gravity center -draw "text 0,0 'DK OS'" \
          $TARGET_DIR/kali-logo-light.png
          
          cp $TARGET_DIR/kali-logo-light.png $TARGET_DIR/kali-logo-dark.png

      - name: 6. Tích hợp giao diện XFCE, Terminal, Wifi và App
        run: |
          mkdir -p live-build/config/package-lists
          
          # Đảm bảo hệ thống tích hợp đầy đủ Driver Wifi, Terminal, Chrome và giao diện đồ họa mượt nhẹ
          if [ -f config/packages.chroot ]; then
            cp config/packages.chroot live-build/config/package-lists/kali.list.chroot
          else
            echo "kali-desktop-xfce xfce4-terminal kali-themes lightdm network-manager-gnome firmware-linux firmware-linux-nonfree firmware-iwlwifi firmware-realtek firmware-brcm80211 wpasupplicant chromium" > live-build/config/package-lists/kali.list.chroot
          fi
          
          # Nhúng file thông tin About cá nhân hóa vào màn hình Desktop
          if [ -d config/includes.chroot ]; then
            cp -r config/includes.chroot/* live-build/config/includes.chroot/
          fi

      - name: 7. Bắt đầu biên dịch và nén đĩa ISO hoàn chỉnh
        run: |
          cd live-build
          # Thực thi lệnh đóng gói tối cao
          sudo lb build

      - name: 8. Tự động đẩy file ISO lên mục GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Bản dựng sửa lỗi hoàn chỉnh (Bản FULL FIX)! Vượt qua mọi lỗi 404 và đồng bộ hóa hệ thống thành công."
          files: live-build/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
