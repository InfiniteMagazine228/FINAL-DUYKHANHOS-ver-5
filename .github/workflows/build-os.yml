name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Giữ nút bấm thủ công cho DuyKhánh

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kiểm tra mã nguồn kho lưu trữ DuyKhánh OS
        uses: actions/checkout@v4

      - name: 2. Chạy Makefile đóng gói OS trong môi trường Docker Kali
        run: |
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/__w/FINAL-DUYKHANHOS-ver-5/FINAL-DUYKHANHOS-ver-5 \
            -w /__w/FINAL-DUYKHANHOS-ver-5/FINAL-DUYKHANHOS-ver-5 \
            kalilinux/kali-rolling:latest bash -c "
              git config --global --add safe.directory '*' && make build
            "

      - name: 3. Tự động đẩy file ISO lên mục GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Bản dựng TỰ ĐỘNG hoàn chỉnh kết hợp với MAKEFILE! Hệ điều hành DuyKhanhOS v5 tự vẽ hình nền phát sáng độc quyền."
          files: live-build/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
