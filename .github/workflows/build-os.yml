name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cac cong cu can thiet va Kali Live Build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap xorriso squashfs-tools imagemagick fonts-liberation curl

      - name: 3. Thiet lap thu muc cau hinh Kali Live Build
        run: |
          # Nếu chưa có cấu trúc đầy đủ, tự động khởi tạo bộ khung tiêu chuẩn
          if [ ! -d "config" ]; then
            lb config --architectures amd64 --distribution kali-rolling --binary-images iso-hybrid
          fi
          
          # Đảm bảo các thư mục chứa file tùy biến hệ thống tồn tại
          mkdir -p config/includes.chroot/etc/skel/Desktop
          mkdir -p config/includes.chroot/usr/share/backgrounds/custom
          mkdir -p config/hooks/live

      - name: 4. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          
          # 4.1 Tự vẽ màn hình nền Desktop chính của hệ điều hành
          convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            config/includes.chroot/usr/share/backgrounds/custom/wallpaper.png

          # Ép hệ thống tự nhận hình nền này khi load vào màn hình máy tính
          echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> config/includes.chroot/etc/skel/.bashrc

      - name: 5. Khong che va Cau hinh phim tat Zalo Web ra Desktop
        run: |
          # Tạo lối tắt Zalo Web chạy bằng trình duyệt ra thẳng Desktop của người dùng
          echo -e '[Desktop Entry]\nName=Zalo Web\nComment=App cuu ho Zalo\nExec=google-chrome --no-sandbox https://zalo.me\nIcon=web-browser\nTerminal=false\nType=Application\nCategories=Network;' > config/includes.chroot/etc/skel/Desktop/zalo.desktop
          chmod +x config/includes.chroot/etc/skel/Desktop/zalo.desktop

      - name: 6. Chen Script tu dong tai Google Chrome vao lõi Kali
        run: |
          # Vì Chrome không có sẵn trong kho mã nguồn Kali, tạo Hook để tự nạp file .deb khi build
          cat << 'EOF' > config/hooks/live/install-chrome.chroot
          #!/bin/sh
          apt-get update
          curl -LO https://google.com
          apt-get install -y ./google-chrome-stable_current_amd64.deb
          rm google-chrome-stable_current_amd64.deb
          EOF
          chmod +x config/hooks/live/install-chrome.chroot

      - name: 7. Tien hanh bien dich he thong (Kali Live Build)
        run: |
          # Chạy lệnh build chính chủ của Kali để tự đọc file packages.chroot của bạn
          # Thao tác này tự nạp GRUB Bootloader nguyên bản, tương thích UEFI + Legacy cho Ventoy
          sudo lb build

      - name: 8. Sap xep va Doi ten file ISO dau ra
        run: |
          mkdir -p output
          # Tìm file .iso vừa build xong và chuyển vào thư mục output với tên thương hiệu của bạn
          find . -maxdepth 1 -name "*.iso" -exec mv {} output/FINAL-DUYKHANHOS-ver-5.iso \;

      - name: 9. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: "Hệ điều hành cứu hộ độc quyền thương hiệu DuyKhanhDevelop đã hoàn thành! Hệ thống tự động biên dịch bằng Kali Live Build, tích hợp bộ phần mềm trong packages.chroot, giao diện tự vẽ, có sẵn lõi GRUB chuẩn cho Ventoy, tự nhận Wifi, Chrome và Zalo Web."
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
