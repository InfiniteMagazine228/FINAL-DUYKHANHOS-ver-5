name: Build FINAL-DUYKHANHOS v5 - Installer Edition

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat cac cong cu can thiet
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            squashfs-tools xorriso isolinux \
            imagemagick fonts-liberation mtools \
            grub-pc-bin grub-efi-amd64-bin dosfstools \
            debootstrap debian-archive-keyring

      - name: 3. Tao he thong nen tang voi Docker AMD64
        run: |
          mkdir -p source/squashfs source/iso/live source/iso/boot/grub source/iso/EFI/boot output

          docker pull kalilinux/kali-rolling:latest
          docker run --name kalicore -d kalilinux/kali-rolling:latest tail -f /dev/null

          # Cài kernel + calamares installer thay vì live-boot
          docker exec kalicore apt-get update
          docker exec kalicore apt-get install -y --no-install-recommends \
            linux-image-amd64 \
            systemd systemd-sysv init \
            calamares calamares-settings-debian \
            fastfetch

          docker cp kalicore:/ source/squashfs/
          docker rm -f kalicore

      - name: 4. Cai dat phan mem tu packages.chroot
        run: |
          CONFIG_FILE="config/packages.chroot"

          TARGET_PACKAGES=""
          if [ -f "$CONFIG_FILE" ]; then
            echo "==> Da tim thay file cau hinh: $CONFIG_FILE"
            TARGET_PACKAGES=$(grep -v '^#' "$CONFIG_FILE" | grep -v '^$' | tr '\n' ' ')
          else
            echo "==> Dung goi mac dinh"
            TARGET_PACKAGES="kali-desktop-xfce lightdm xfce4-terminal thunar network-manager-gnome firmware-linux chromium"
          fi

          sudo bash -c "cat << 'EOF' > source/squashfs/etc/apt/sources.list
          deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware
          EOF"

          sudo chroot source/squashfs /bin/bash -c "
            apt-get update || true
            apt-get install -y --allow-unauthenticated kali-archive-keyring || true
            apt-get update

            # Phan mem chinh
            apt-get install -y --no-install-recommends $TARGET_PACKAGES

            # Bo go tieng Viet
            apt-get install -y --no-install-recommends ibus ibus-unikey zenity

            # Tao symlink neofetch -> fastfetch
            ln -s /usr/bin/fastfetch /usr/bin/neofetch || true

            # Calamares installer (GUI cai dat len o cung)
            apt-get install -y --no-install-recommends \
              calamares calamares-settings-kali \
              parted grub-pc grub-efi-amd64 os-prober

            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      - name: 5. Cau hinh Calamares - Trinh cai dat len o cung
        run: |
          sudo mkdir -p source/squashfs/etc/calamares/modules

          # Cau hinh chon phan vung tu dong
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/calamares/settings.conf
          modules-search: [ local, /usr/lib/calamares/modules ]
          sequence:
            - show:
              - welcome
              - locale
              - keyboard
              - partition
              - users
              - summary
            - exec:
              - partition
              - mount
              - unpackfs
              - machineid
              - fstab
              - locale
              - keyboard
              - localecfg
              - users
              - displaymanager
              - networkcfg
              - hwclock
              - grubcfg
              - bootloader
              - packages
              - removeuser
              - unmount
            - show:
              - finished
          branding: kali
          prompt-install: true
          EOF"

          # Cau hinh nguon filesystem de copy sang o cung
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/calamares/modules/unpackfs.conf
          unpack:
            - source: /run/live/medium/live/filesystem.squashfs
              sourcefs: squashfs
              destination: ''
          EOF"

          # Tao shortcut Calamares tren Desktop
          sudo mkdir -p source/squashfs/etc/skel/Desktop
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/install.desktop
          [Desktop Entry]
          Name=Install DUYKHANHOS to Disk
          Exec=pkexec calamares
          Icon=system-software-install
          Terminal=false
          Type=Application
          Categories=System;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/install.desktop

      - name: 6. Custom UI - Thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/

          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center \
            -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center \
            -draw "text 0,20 'WIN THE RESCUE SYSTEM - INSTALLER EDITION'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast \
            -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png

          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image \
              -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 7. Dong goi squashfs + Kernel + GRUB Installer
        run: |
          # Nen filesystem thanh squashfs (calamares se copy nay len o cung)
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs \
            -comp gzip -processors 4

          # Copy kernel va initrd
          sudo cp $(find source/squashfs/boot/ -name "vmlinuz*" | head -n 1) source/iso/live/vmlinuz
          sudo cp $(find source/squashfs/boot/ -name "initrd.img*" | head -n 1) source/iso/live/initrd.img

          # GRUB menu co 2 lua chon: Install va Try Live
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          insmod iso9660
          insmod linux
          set timeout=10
          set default=0

          menuentry 'Install DUYKHANHOS v5 to Hard Disk' {
              linux /live/vmlinuz boot=live components quiet splash INSTALLER=true
              initrd /live/initrd.img
          }

          menuentry 'Try DUYKHANHOS v5 (Without Installing)' {
              linux /live/vmlinuz boot=live components quiet splash
              initrd /live/initrd.img
          }
          EOF"

          # Build UEFI bootloader
          sudo grub-mkimage \
            -o source/iso/EFI/boot/bootx64.efi \
            -p /boot/grub \
            -O x86_64-efi \
            iso9660 normal test loadenv part_msdos part_gpt fat ext2 linux boot configfile echo

          # Tao efiboot.img cho UEFI
          dd if=/dev/zero of=source/iso/boot/efiboot.img bs=1M count=4
          mkfs.vfat -F 12 source/iso/boot/efiboot.img
          mmd -i source/iso/boot/efiboot.img ::/EFI
          mmd -i source/iso/boot/efiboot.img ::/EFI/boot
          mcopy -i source/iso/boot/efiboot.img \
            source/iso/EFI/boot/bootx64.efi ::/EFI/boot/bootx64.efi

      - name: 8. Dong goi ISO Hybrid Ventoy-Compatible
        run: |
          cd source/iso
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid "DUYKHANHOS" \
            -eltorito-alt-boot \
            -e boot/efiboot.img \
            -no-emul-boot \
            -isohybrid-gpt-basdat \
            -output "../../output/FINAL-DUYKHANHOS-ver-5-INSTALLER.iso" .

      - name: 9. Day ISO len GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-installer
          name: FINAL-DUYKHANHOS-ver-5-INSTALLER
          body: |
            🚀 INSTALLER EDITION - Cài thẳng lên ổ cứng!
            - ✅ Boot qua USB Ventoy (MBR/GPT) trên máy thật
            - ✅ Trình cài đặt GUI Calamares: chọn phân vùng, tạo user, cài GRUB
            - ✅ Menu GRUB 2 lựa chọn: **Install** hoặc **Try Live**
            - ✅ Kiến trúc AMD64 chuẩn, hỗ trợ UEFI + Legacy BIOS
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
