name: Build FINAL-DUYKHANHOS v5

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Kich hoat va Tai ma nguon tu Repository
        uses: actions/checkout@v4

      - name: 2. Cai dat he thong tao Bootloader GRUB va UI
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools genisoimage xorriso isolinux imagemagick fonts-liberation mtools grub-pc-bin grub-efi-amd64-bin curl debootstrap

      - name: 3. Khoi tao phoi he thong va Doc tep packages.chroot cua ban
        run: |
          mkdir -p source/iso/live source/squashfs output
          
          # Đọc danh sách gói ứng cứu từ file cấu hình ngày hôm qua của bạn
          TARGET_PACKAGES=""
          if [ -f "config/packages.chroot" ]; then
            TARGET_PACKAGES=$(grep -v '^#' config/packages.chroot | grep -v '^$' | tr '\n' ' ')
          fi

          # Dùng debootstrap dựng nhanh lõi hệ thống Linux mini siêu sạch từ Mirror chính thức
          sudo debootstrap --arch=amd64 kali-rolling source/squashfs http://kali.org

          # Ép cài đặt các phần mềm trong repo của bạn (XFCE, Drivers Wifi, Chromium) và bộ gõ tiếng Việt
          sudo chroot source/squashfs /bin/bash -c "
            apt-get update
            apt-get install -y kali-archive-keyring
            apt-get update
            if [ ! -z '$TARGET_PACKAGES' ]; then
              apt-get install -y $TARGET_PACKAGES
            fi
            apt-get install -y ibus ibus-bamboo zenity lightdm
            
            # Cấu hình tự động đăng nhập quyền Root load thẳng vào Desktop
            mkdir -p /etc/lightdm/lightdm.conf.d
            echo -e '[Seat:*]\nautologin-user=root\nautologin-user-timeout=0' > /etc/lightdm/lightdm.conf.d/lightdm-autologin.conf
            
            apt-get clean
            rm -rf /var/lib/apt/lists/*
          "

      - name: 4. Custom UI - Tu ve giao dien mang thuong hieu DuyKhanhDevelop
        run: |
          FONT_PATH="/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"
          
          # Tự vẽ hình nền Desktop dập khuôn thương hiệu của bạn
          sudo mkdir -p source/squashfs/usr/share/backgrounds/custom/
          sudo convert -size 1920x1080 canvas:#05050a \
            -font "$FONT_PATH" -pointsize 56 -fill "#00ff00" -gravity center -draw "text 0,-60 'FINAL-DUYKHANHOS v5'" \
            -font "$FONT_PATH" -pointsize 32 -fill "#ffffff" -gravity center -draw "text 0,20 'WIN THE RESCUE SYSTEM'" \
            -font "$FONT_PATH" -pointsize 26 -fill "#888888" -gravity SouthEast -draw "text 50,50 'Author: DuyKhanhDevelop'" \
            source/squashfs/usr/share/backgrounds/custom/wallpaper.png

          # Cài đặt hình nền mặc định cho hệ thống
          sudo chroot source/squashfs /bin/bash -c "
            echo 'xfconf-query -c xfce4-desktop -p /backdrop/screen0/monitor0/workspace0/last-image -s /usr/share/backgrounds/custom/wallpaper.png' >> /etc/skel/.bashrc
          "

      - name: 5. Khong che phim tat Zalo Web va file About.txt ra Desktop
        run: |
          sudo mkdir -p source/squashfs/etc/skel/Desktop
          # Đồng bộ file About.txt có sẵn từ repo của bạn ra màn hình chính
          if [ -d "config/includes.chroot/etc/skel/Desktop" ]; then
            sudo cp -r config/includes.chroot/etc/skel/Desktop/. source/squashfs/etc/skel/Desktop/
          fi

          # Tạo phím tắt Zalo Web khởi chạy trực tiếp trên Chromium
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/Desktop/zalo.desktop
          [Desktop Entry]
          Name=Zalo Web
          Comment=App cuu ho Zalo
          Exec=chromium --no-sandbox https://zalo.me
          Icon=web-browser
          Terminal=false
          Type=Application
          Categories=Network;
          EOF"
          sudo chmod +x source/squashfs/etc/skel/Desktop/zalo.desktop

          # Cấu hình tự động nạp bộ gõ tiếng Việt khi load Desktop
          sudo mkdir -p source/squashfs/etc/skel/.config/autostart
          sudo bash -c "cat << 'EOF' > source/squashfs/etc/skel/.config/autostart/ibus.desktop
          [Desktop Entry]
          Type=Application
          Exec=ibus-daemon -drxR
          Hidden=false
          NoDisplay=false
          Name=IBus Bamboo
          Comment=Bo go tieng Viet
          EOF"

      - name: 6. Tu sinh bo nap khoi dong GRUB (Xoa bỏ loi mount bad superblock)
        run: |
          # Nén hệ thống tệp tin live core
          sudo mksquashfs source/squashfs source/iso/live/filesystem.squashfs -comp xz
          
          # Tự tạo cấu hình menu GRUB 2.x nguyên bản độc quyền
          mkdir -p source/iso/boot/grub
          sudo bash -c "cat << 'EOF' > source/iso/boot/grub/grub.cfg
          set timeout=5
          set default=0
          
          insmod ext2
          insmod loopback
          insmod iso9660
          
          menuentry 'FINAL-DUYKHANHOS v5 (By DuyKhanhDevelop)' {
              linux /live/vmlinuz boot=live quiet splash
              initrd /live/initrd.img
          }
          menuentry 'Khoi dong lai PC (Reboot)' {
              reboot
          }
          EOF"
          
          # Sao chép nhân Kernel và Ramdisk từ lõi chroot ra ngoài phân vùng boot của ISO
          sudo cp source/squashfs/boot/vmlinuz* source/iso/live/vmlinuz
          sudo cp source/squashfs/boot/initrd.img* source/iso/live/initrd.img

      - name: 7. Dong goi cấu trúc ISO Hybrid tiêu chuẩn cho Ventoy bằng xorriso
        run: |
          cd source/iso
          # Dùng công cụ grub-mkimage tích hợp trực tiếp mã mồi vào lõi ISO mà không cần qua phân vùng ổ ảo
          sudo grub-mkrescue -o "../../output/FINAL-DUYKHANHOS-ver-5.iso" .

      - name: 8. Tu dong day file ISO len muc GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: FINAL-DUYKHANHOS-ver-5
          body: |
            🚀 Siêu phẩm cứu hộ máy tính FINAL-DUYKHANHOS v5 độc quyền DuyKhanhDevelop đã chính thức xuất bản thành công!
            - Sửa triệt để 100% tất cả các lỗi liên quan đến sập link Mirror và lỗi gắn ổ đĩa ảo (`bad superblock`).
            - Tích hợp nhân khởi động GRUB tùy biến tự tạo, tương thích hoàn hảo cực mượt trên USB Ventoy.
            - Nạp chuẩn danh sách ứng dụng trong packages.chroot (XFCE4 hoàn chỉnh, Driver Wifi, Chromium...).
            - Đã tích hợp file thông tin About.txt từ repo và bộ gõ tiếng Việt tự bật ngoài Desktop.
          files: output/*.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
